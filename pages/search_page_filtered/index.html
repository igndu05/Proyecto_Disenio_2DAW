<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de búsqueda (filtro)</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <link rel="icon" href="../../images/Icono_principal.png">
</head>
<body>
    <header>
        <a href="../../index.html">
            <img src="../../icons/logo-icon.svg" alt="icono-logo" />
        </a>
        <div class="icons-header">
            <img src="../../icons/search-icon.svg" alt="icono-busqueda" />
            <img src="../../icons/shopping-cart.svg" alt="icono-carrito" />
            <a href="../login_page/index.html">
                <img src="../../icons/profile-icon.svg" alt="icono-perfil" />
            </a>
        </div>
    </header>
    
    <main>
        <div class="search-container">
            <div class="filter-search">
                <h4>Filtrar</h4>
                <a href="../search_page/index.html">
                    <img src="../../icons/filter-icon.svg" alt="filtro-icono"/>
                </a>
            </div>
            <input type="text" name="search" id="search" placeholder="¿Qué buscas?"/>
        </div>
        <div class="filters">
            <div class="filter"><input type="checkbox" name="bandas-sonoras" id="bandas-sonoras"/><label for="bandas-sonoras">Bandas sonoras</label></div>
            <div class="filter"><input type="checkbox" name="jazz" id="jazz"/><label for="jazz">Jazz</label></div>
            <div class="filter"><input type="checkbox" name="punkrock" id="punkrock"/><label for="punkrock">Punkrock</label></div>
            <div class="filter"><input type="checkbox" name="pop" id="pop"/><label for="pop">Pop</label></div>
            <div class="filter"><input type="checkbox" name="j-rock" id="j-rock"/><label for="j-rock">J-Rock</label></div>
            <div class="filter"><input type="checkbox" name="reggae" id="reggae"/><label for="reggae">Reggae</label></div>
            <div class="filter"><input type="checkbox" name="rock" id="rock"/><label for="rock">Rock</label></div>
            <div class="filter"><input type="checkbox" name="heavy-metal" id="heavy-metal"/><label for="heavy-metal">Heavy Metal</label></div>
            <div class="filter"><input type="checkbox" name="Hardstyle" id="Hardstyle"/><label for="Hardstyle">Hardstyle</label></div>
        </div>
        <div class="search-products-container">
            <a href="../product_details/index.html">
                <img src="../../images/Display_disc.webp" alt="disco de ejemplo"/>
            </a>
            <a href="../product_details/index.html">
                <img src="../../images/Display_disc.webp" alt="disco de ejemplo"/>
            </a>
            <a href="../product_details/index.html">
                <img src="../../images/Display_disc.webp" alt="disco de ejemplo"/>
            </a>
        </div>
    </main>

    <footer>
        <div class="social-media">
            <p>Nuestras redes sociales</p>
            <div class="icons-social-media">
                <img src="../../icons/Youtube-icon.svg" alt="icono-youtube">
                <img src="../../icons/Twitter-icon.svg" alt="icono-twitter">
                <img src="../../icons/TikTok-icon.svg" alt="icono-tiktok">
                <img src="../../icons/Facebook-icon.svg" alt="icono-facebook">
            </div>
        </div>
        <div class="contact">
            <p>Contactanos</p>
            <div class="mail">
                <p>Correo electrónico:</p>
                <a href="#">inforetrogroove@info.es</a>
            </div>
            <div class="phone">
                <p>Número de teléfono:</p>
                <a href="#">+34 000 11 22 33</a>
            </div>
        </div>
        <div class="conditions">
            <a href="#">Condiciones de uso y venta</a>
            <a href="#">Aviso de privacidad</a>
            <a href="#">Area legal</a>
            <a href="#">Cookies</a>
            <a href="#">Publicidad basada en intereses</a>
        </div>
        <div class="copyright">
            <p>&copy; 2025, Retrogroove.com, Inc. o sus afiliados</p>
        </div>
    </footer>
</body>
</html>
